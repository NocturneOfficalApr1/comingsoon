<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      color:#fff;
      font-family:'Orbitron', sans-serif;
      overflow-x:hidden;
      position:relative;
      min-height:100vh;
    }
    canvas#bg {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:1;
    }
    main { position:relative; z-index:2; }

    .countdown {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    /* 倒計時外框優化 */
    .timer-box {
      background: rgba(255, 255, 255, 0.95);
      color: #000;
      padding: 2rem;
      border-radius: 24px;
      box-shadow: 0 0 50px rgba(255,255,255,0.3);
      margin-bottom: 2rem;
      width: 90%;
      max-width: 800px;
    }

    #timer {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap; /* 重要：手機版空間不足時自動換行 */
    }

    /* 單個數字方塊 */
    .time-segment {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 100px;
    }

    #timer span.num {
      font-size: 4rem;
      font-weight: 900;
      display: block;
      line-height: 1;
    }

    #timer span.unit {
      font-size: 1.2rem;
      font-weight: 700;
      color: #666;
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
    }

    .coming {
      font-size: 3rem;
      letter-spacing: 0.4em;
      opacity: 0.8;
      margin-bottom: 2.5rem;
    }

    /* 按鈕與連結 */
    .preview-btn {
      background: linear-gradient(135deg, #6e48aa, #9d50bb);
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(110, 72, 170, 0.4);
      transition: 0.3s;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    .preview-btn:hover { transform: translateY(-3px); }

    .threads-link { text-decoration: none; transition: 0.3s; display: inline-block; }
    .threads-icon { width: 50px; height: 50px; margin-bottom: 0.5rem; }
    .threads-text { display: block; color: #fff; font-size: 0.9rem; opacity: 0.7; }

    /* 成員預告區塊 */
    .silhouettes {
      padding: 60px 5%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }
    .silhouette {
      width: 100%;
      max-width: 300px;
      aspect-ratio: 3/5;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center bottom;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
    }
    .s1 { background-image:url('https://i.imgur.com/T8H7ggB.png'); }
    .s2 { background-image:url('https://i.imgur.com/thHuT4z.png'); }
    .s3 { background-image:url('https://i.imgur.com/jWUbbfE.png'); }
    .s4 { background-image:url('https://i.imgur.com/YPhaXLc.png'); }
    .s5 { background-image:url('https://i.imgur.com/xu1LVnW.jpeg'); }

    /* RWD 手機版微調 */
    @media (max-width: 600px) {
      .timer-box { padding: 1.5rem 1rem; }
      #timer { gap: 1rem; }
      .time-segment { min-width: 70px; }
      #timer span.num { font-size: 2.5rem; }
      #timer span.unit { font-size: 0.9rem; }
      .coming { font-size: 1.5rem; letter-spacing: 0.2em; }
    }

    /* 電腦版斜線效果維持 */
    @media (min-width: 901px) {
      .silhouettes { flex-wrap: nowrap; gap: 0; }
      .silhouette { 
        flex: 1; 
        clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); 
        transition: 0.5s;
      }
      .silhouette:hover { flex: 1.5; filter: brightness(1.2); }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<main>
  <section class="countdown">
    <div class="timer-box">
      <div id="timer">
        </div>
    </div>
    <div class="coming">COMING SOON</div>
    
    <button class="preview-btn" onclick="document.querySelector('.silhouettes').scrollIntoView({behavior: 'smooth'})">
      成員預告
    </button>

    <div class="threads-wrapper">
      <a href="https://www.threads.net/@nocturne.ffxiv" target="_blank" class="threads-link">
        <img src="https://i.imgur.com/7XZD75f.png" alt="Threads" class="threads-icon">
        <span class="threads-text">FOLLOW US</span>
      </a>
    </div>
  </section>

  <section class="silhouettes">
    <div class="silhouette s1"></div>
    <div class="silhouette s2"></div>
    <div class="silhouette s3"></div>
    <div class="silhouette s4"></div>
    <div class="silhouette s5"></div>
  </section>
</main>

<script>
// 設定目標時間 [cite: 41]
const target = new Date("2026-04-01T20:00:00+08:00").getTime();

function updateTimer() {
  const dist = target - Date.now();
  const t = {
    d: Math.floor(dist / 86400000).toString().padStart(2, '0'),
    h: Math.floor((dist % 86400000) / 3600000).toString().padStart(2, '0'),
    m: Math.floor((dist % 3600000) / 60000).toString().padStart(2, '0'),
    s: Math.floor((dist % 60000) / 1000).toString().padStart(2, '0')
  };

  const labels = { d: 'DAYS', h: 'HOURS', m: 'MINS', s: 'SECS' };
  
  let html = '';
  ['d','h','m','s'].forEach(key => {
    html += `
      <div class="time-segment">
        <span class="num">${dist > 0 ? t[key] : '00'}</span>
        <span class="unit">${labels[key]}</span>
      </div>
    `;
  });

  document.getElementById("timer").innerHTML = html;
}

setInterval(updateTimer, 1000);
updateTimer();

// 背景粒子動畫 [cite: 47, 48, 49, 50]
const c = document.getElementById('bg');
const ctx = c.getContext('2d');
let w, h, stars = [];

function init() {
  w = c.width = window.innerWidth;
  h = c.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      size: Math.random() * 2,
      speed: Math.random() * 0.5 + 0.1,
      o: Math.random()
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, w, h);
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.o})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
    s.y += s.speed;
    if (s.y > h) s.y = -10;
  });
  requestAnimationFrame(draw);
}

window.addEventListener('resize', init);
init();
draw();
</script>

</body>
</html>
